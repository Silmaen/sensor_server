<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e" stroke="#e67e22" stroke-width="3"/>

  <!-- Signal waves -->
  <path d="M60 28 Q60 28 60 28" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M44 22 A24 24 0 0 1 76 22" fill="none" stroke="#e67e22" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M36 16 A34 34 0 0 1 84 16" fill="none" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Thermometer body -->
  <rect x="55" y="30" width="10" height="40" rx="5" fill="#e8e8e8" stroke="#e67e22" stroke-width="1.5"/>
  <!-- Thermometer bulb -->
  <circle cx="60" cy="74" r="10" fill="#e8e8e8" stroke="#e67e22" stroke-width="1.5"/>
  <!-- Mercury -->
  <rect x="57.5" y="42" width="5" height="28" rx="2.5" fill="#d35400"/>
  <circle cx="60" cy="74" r="7" fill="#d35400"/>

  <!-- Tick marks on thermometer -->
  <line x1="66" y1="38" x2="69" y2="38" stroke="#e67e22" stroke-width="1" opacity="0.6"/>
  <line x1="66" y1="44" x2="69" y2="44" stroke="#e67e22" stroke-width="1" opacity="0.6"/>
  <line x1="66" y1="50" x2="69" y2="50" stroke="#e67e22" stroke-width="1" opacity="0.6"/>
  <line x1="66" y1="56" x2="69" y2="56" stroke="#e67e22" stroke-width="1" opacity="0.6"/>

  <!-- Data dots (sensors scattered) -->
  <circle cx="30" cy="50" r="3.5" fill="#f39c12" opacity="0.9"/>
  <circle cx="90" cy="50" r="3.5" fill="#f39c12" opacity="0.9"/>
  <circle cx="35" cy="80" r="3.5" fill="#2ecc40" opacity="0.9"/>
  <circle cx="85" cy="80" r="3.5" fill="#2ecc40" opacity="0.9"/>

  <!-- Connection lines from dots to center -->
  <line x1="33" y1="50" x2="50" y2="60" stroke="#f39c12" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="87" y1="50" x2="70" y2="60" stroke="#f39c12" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="37" y1="78" x2="52" y2="70" stroke="#2ecc40" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="83" y1="78" x2="68" y2="70" stroke="#2ecc40" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- Bottom text -->
  <text x="60" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#e8e8e8" letter-spacing="1">IoT</text>
</svg>
