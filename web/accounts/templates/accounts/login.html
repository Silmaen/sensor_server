{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Log in" %}{% endblock %}

{% block content %}
<article style="max-width: 400px; margin: 2rem auto;">
    <header>
        <h2>{% trans "Log in" %}</h2>
    </header>
    {% if error %}
        <p style="color: var(--pico-del-color);">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>
            {% trans "Username" %}
            <input type="text" name="username" required autofocus>
        </label>
        <label>
            {% trans "Password" %}
            <input type="password" name="password" required>
        </label>
        <button type="submit">{% trans "Sign in" %}</button>
    </form>
</article>
{% endblock %}
